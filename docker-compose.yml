# Zanjir - Docker Compose Configuration
# Air-gapped friendly Matrix deployment with Caddy internal TLS

services:
  conduit:
    image: ${CONDUIT_IMAGE:-docker.io/matrixconduit/matrix-conduit:latest}
    container_name: zanjir-conduit
    restart: unless-stopped
    environment:
      CONDUIT_SERVER_NAME: ${DOMAIN}
      CONDUIT_DATABASE_BACKEND: rocksdb
      CONDUIT_DATABASE_PATH: /var/lib/matrix-conduit/
      CONDUIT_PORT: 6167
      CONDUIT_MAX_REQUEST_SIZE: 20000000
      CONDUIT_ALLOW_REGISTRATION: "true"
      CONDUIT_ALLOW_FEDERATION: "false"
      CONDUIT_ALLOW_ENCRYPTION: "true"
      CONDUIT_ALLOW_GUEST_ACCESS: "false"
      CONDUIT_TRUSTED_SERVERS: '["matrix.org"]'
      CONDUIT_ADDRESS: 0.0.0.0
      CONDUIT_LOG: "info,rocket=off,_=off,sled=off"
      CONDUIT_CONFIG: ""
    volumes:
      - conduit-data:/var/lib/matrix-conduit/
    networks:
      - zanjir-network

  coturn:
    image: ${COTURN_IMAGE:-coturn/coturn:latest}
    container_name: zanjir-coturn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "5349:5349/udp"
    environment:
      TURN_STATIC_SECRET: ${TURN_SECRET}
      TURN_REALM: ${DOMAIN}
    command:
      - "-n"
      - "--log-file=stdout"
      - "--listening-port=3478"
      - "--tls-listening-port=5349"
      - "--min-port=49152"
      - "--max-port=65535"
      - "--realm=${DOMAIN}"
      - "--use-auth-secret"
      - "--static-auth-secret=${TURN_SECRET}"
      - "--no-tls"
      - "--no-dtls"
    networks:
      - zanjir-network

  admin:
    build: ./admin
    container_name: zanjir-admin
    restart: unless-stopped
    environment:
      CONDUIT_URL: http://conduit:6167
      REGISTRATION_SHARED_SECRET: ${REGISTRATION_SHARED_SECRET}
      DOMAIN: ${DOMAIN}
    volumes:
      - ./admin:/app
      - admin-data:/app/data
    networks:
      - zanjir-network
    depends_on:
      - conduit

  element-web:
    image: ${ELEMENT_IMAGE:-vectorim/element-web:v1.11.50}
    container_name: zanjir-element-web
    restart: unless-stopped
    volumes:
      - ./config/element-config.json:/app/config.json:ro
      - ./config/welcome.html:/app/welcome.html:ro
      - ./config/logo.webp:/app/logo.webp:ro
      - ./config/custom.css:/app/custom.css:ro
    networks:
      - zanjir-network

  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    container_name: zanjir-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN}
      HTTP_PORT: ${HTTP_PORT:-80}
      HTTPS_PORT: ${HTTPS_PORT:-443}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - zanjir-network
    depends_on:
      - conduit
      - admin
      - element-web

networks:
  zanjir-network:
    driver: bridge

volumes:
  conduit-data:
    name: zanjir-conduit-data
  caddy-data:
    name: zanjir-caddy-data
  caddy-config:
    name: zanjir-caddy-config
  admin-data:
    name: zanjir-admin-data
